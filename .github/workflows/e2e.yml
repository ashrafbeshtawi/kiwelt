name: E2E

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev stack (Mailpit + web)
        run: docker compose up -d --build

      - name: Wait for web on :3000
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "web is up"
              exit 0
            fi
            sleep 2
          done
          echo "web did not become ready in time" >&2
          docker compose logs web
          exit 1

      - name: Wait for Mailpit on :8025
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8025/api/v1/messages > /dev/null; then
              echo "mailpit is up"
              exit 0
            fi
            sleep 1
          done
          docker compose logs mail
          exit 1

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          PW_BASE_URL: http://localhost:3000
          PW_MAILPIT_URL: http://localhost:8025

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v

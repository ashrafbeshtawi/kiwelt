services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      SMTP_HOST: mail
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      MAIL_FROM: "Datenflow Website <noreply@datenflow.local>"
      MAIL_TO_CONTACT: "kontakt@datenflow.local"
      MAIL_TO_KARRIERE: "jobs@datenflow.local"
    depends_on:
      - mail

  mail:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP
    environment:
      MP_MAX_MESSAGES: "500"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
